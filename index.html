<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple BMI Calculator</title>
    <style>
        /* Modern reset and centering */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #109c1c;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card container style */
        .container {
            background-color: #720734;
            width: 100%;
            max-width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        /* Header typography */
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #176f7a;
            font-size: 24px;
            text-align: center;
        }

        /* Form labels */
        label {
            display: block;
            margin-bottom: 6px;
            color: #2f0a5f;
            font-size: 14px;
            font-weight: 600;
        }

        /* Inputs fields styling */
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #770606;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="number"]:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.15);
            outline: none;
        }

        /* Button styling with hover transition */
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: rgb(47, 68, 7);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #218838;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Result section layout */
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
            line-height: 1.5;
            background-color: #0d6f8d;
            border: 1px solid #050c13;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BMI Calculator</h2>
    <label for="weight">Weight (kg):</label>
    <input type="number" id="weight" placeholder="e.g. 70" step="any">
    
    <label for="height">Height (cm):</label>
    <input type="number" id="height" placeholder="e.g. 175" step="any">
    
    <button onclick="calculateBMI()">Calculate BMI</button>
    <div id="result">Enter your stats above.</div>
</div>

<script>
function calculateBMI() {
    // 1. Get input values
    const weight = parseFloat(document.getElementById('weight').value);
    const heightCm = parseFloat(document.getElementById('height').value);
    const resultDiv = document.getElementById('result');

    // 2. Validate inputs
    if (isNaN(weight) || isNaN(heightCm) || weight <= 0 || heightCm <= 0) {
        resultDiv.innerHTML = "Please enter valid numbers.";
        resultDiv.style.color = "#dc3545"; // Red error color
        resultDiv.style.backgroundColor = "#f8d7da";
        resultDiv.style.borderColor = "#f5c6cb";
        return;
    }

    // 3. Calculate BMI
    const heightM = heightCm / 100;
    const bmi = weight / (heightM * heightM);

    // 4. Determine category
    let category = "";
    if (bmi < 18.5) {
        category = "Underweight";
    } else if (bmi < 25) {
        category = "Normal weight";
    } else if (bmi < 30) {
        category = "Overweight";
    } else {
        category = "Obese";
    }

    // 5. Display result
    resultDiv.innerHTML = `Your BMI is: <strong>${bmi.toFixed(2)}</strong><br>Category: <strong>${category}</strong>`;
    resultDiv.style.color = "#212529"; // Dark grey text color
    resultDiv.style.backgroundColor = "#e2f0d9"; // Light green success background
    resultDiv.style.borderColor = "#c3e6cb";
}
</script>

</body>
</html>
